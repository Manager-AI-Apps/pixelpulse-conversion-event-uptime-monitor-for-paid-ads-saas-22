# Render service config for Build Engine apps.
# This file lives in the template so future deploys (after the first one
# created via Render API) auto-detect the same shape.
#
# The Build Engine's Deployer also passes equivalent config via Render's API
# during initial provisioning, so this file is a redundant safety net rather
# than the source of truth.

services:
  - type: web
    name: build-engine-app
    runtime: node
    plan: free
    branch: main
    buildCommand: pnpm install && pnpm build
    # `pnpm start` runs `node server.js` which (a) binds explicitly on
    # 0.0.0.0 (Next.js 16's -H flag is broken on Render) and (b) runs
    # drizzle-kit push at startup so free-tier deploys (where
    # preDeployCommand is skipped) still get their schema applied.
    startCommand: pnpm start
    # Belt-and-suspenders: on paid plans this runs and the in-server
    # push at startup is a no-op (schema already current). On free
    # plans Render silently skips this and server.js's push is what
    # actually applies the schema.
    preDeployCommand: pnpm install && pnpm exec drizzle-kit push --force
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false

  # Background worker: polls check_run for pending/pending_retry jobs and
  # replays funnels with a headless browser (Playwright). Separate from the
  # web service so Playwright binaries don't bloat the Next.js image.
  - type: worker
    name: build-engine-worker
    runtime: node
    plan: free
    branch: main
    buildCommand: pnpm install && pnpm exec playwright install --with-deps chromium
    startCommand: node -e "const {runWorkerCycle}=require('./.next/server/lib/worker/index');const{chromium}=require('playwright');(async()=>{while(true){try{await runWorkerCycle(()=>chromium.launch({headless:true}).then(b=>b.newPage()))}catch(e){console.error('[worker]',e)}await new Promise(r=>setTimeout(r,15000))}})();"
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false

databases:
  - name: build-engine-db
    plan: free
