<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelPulse Recorder</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      min-height: 440px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    header .logo {
      width: 22px; height: 22px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header .status-pill {
      margin-left: auto;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
      transition: background 0.2s, color 0.2s;
    }

    header .status-pill.recording {
      background: #dc2626;
      color: #fff;
      border-color: #dc2626;
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.7; }
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    button {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover { background: #293548; border-color: #475569; }

    #start-btn  { border-color: var(--accent); color: var(--accent); }
    #start-btn:hover { background: rgba(99,102,241,0.12); }

    #start-btn.active {
      background: #dc2626;
      border-color: #dc2626;
      color: #fff;
    }
    #start-btn.active:hover { background: #b91c1c; }

    #export-btn { border-color: #10b981; color: #10b981; }
    #export-btn:hover { background: rgba(16,185,129,0.1); }
    #export-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #clear-btn { border-color: var(--danger); color: var(--danger); }
    #clear-btn:hover { background: rgba(239,68,68,0.1); }

    .steps-header {
      padding: 10px 16px 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #step-count {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 1px 7px;
      font-size: 10px;
    }

    #steps-list {
      max-height: 280px;
      overflow-y: auto;
      padding: 4px 0 8px;
    }

    .step-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 16px;
      border-bottom: 1px solid rgba(51,65,85,0.5);
      transition: background 0.1s;
    }

    .step-item:last-child { border-bottom: none; }
    .step-item:hover { background: rgba(255,255,255,0.03); }

    .step-index {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      padding-top: 1px;
      flex-shrink: 0;
      width: 18px;
    }

    .step-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .badge-click    { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .badge-fill     { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .badge-navigate { background: rgba(245,158,11,0.2); color: #fcd34d; }
    .badge-wait     { background: rgba(156,163,175,0.2); color: #d1d5db; }

    .step-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .step-selector {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step-url {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.6;
    }

    footer {
      padding: 8px 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      text-align: center;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* scrollbar */
    #steps-list::-webkit-scrollbar { width: 4px; }
    #steps-list::-webkit-scrollbar-track { background: transparent; }
    #steps-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">PP</div>
    <h1>Funnel Recorder</h1>
    <span id="status-pill" class="status-pill">Idle</span>
  </header>

  <div class="controls">
    <button id="start-btn">&#9654; Start</button>
    <button id="export-btn" disabled>&#8659; Export JSON</button>
    <button id="clear-btn">&#10005; Clear</button>
  </div>

  <div class="steps-header">
    <span>Recorded Steps</span>
    <span id="step-count">0</span>
  </div>

  <div id="steps-list">
    <div class="empty-state">
      <div class="icon">&#9654;&#65039;</div>
      <p>Hit <strong>Start</strong> then use your site normally.<br/>Every click, fill, and page load is captured here.</p>
    </div>
  </div>

  <footer>
    <a href="https://pixelpulse.app" target="_blank">pixelpulse.app</a>
    &mdash; Export JSON &rarr; PixelPulse dashboard to replay on schedule
  </footer>

  <script src="popup.js" type="module"></script>
</body>
</html>
